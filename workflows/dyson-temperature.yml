name: Dyson Temperature Logger

on:
  # Déclencheur: toutes les 30 minutes
  schedule:
    - cron: '*/30 * * * *'  # Chaque 30 minutes [web:215]
  # Déclencheur manuel (pour tester)
  workflow_dispatch:

jobs:
  log-temperature:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Dyson Temperature Logger
        env:
          DYSON_EMAIL: ${{ secrets.DYSON_EMAIL }}
          DYSON_PASSWORD: ${{ secrets.DYSON_PASSWORD }}
          GOOGLE_SHEET_NAME: ${{ secrets.GOOGLE_SHEET_NAME }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python main.py

      - name: Show output
        run: echo "Exécution terminée à $(date)"