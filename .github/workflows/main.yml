name: Dyson Temperature Logger

on:
  # Déclencheur: toutes les 30 minutes
  schedule:
    - cron: '*/30 * * * *'  # Chaque 30 minutes [web:215]
  # Déclencheur manuel (pour tester)
  workflow_dispatch:

jobs:
  log-temperature:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          DYSON_EMAIL: ${{ secrets.DYSON_EMAIL }}
          DYSON_PASSWORD: ${{ secrets.DYSON_PASSWORD }}
          GOOGLE_SHEET_NAME: ${{ secrets.GOOGLE_SHEET_NAME }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_WORKSHEET_NAME: ${{ secrets.GOOGLE_WORKSHEET_NAME }}
        run: python main.py